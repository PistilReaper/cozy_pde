workspace: workspace

router:
  model: gpt-5.4
  reasoning_effort: medium
  verbosity: medium
  wire_api: responses
  temperature: 0.0
  max_tokens: 2048

llm_profiles:
  strong_planner:
    model: gpt-5.5
    reasoning_effort: xhigh
    verbosity: medium
    wire_api: responses
    temperature: 0.2
    max_tokens: 8192

  coder:
    model: gpt-5.4
    reasoning_effort: high
    verbosity: medium
    wire_api: responses
    temperature: 0.2
    max_tokens: 8192

  log_summarizer:
    model: gpt-5.2
    reasoning_effort: medium
    verbosity: low
    wire_api: responses
    temperature: 0.0
    max_tokens: 4096

  json_judge:
    model: gpt-5.2
    reasoning_effort: medium
    verbosity: low
    wire_api: responses
    temperature: 0.0
    max_tokens: 2048

openai:
  provider: third_party_openai_compatible
  base_url: "https://aixj.vip"
  api_key_env: "LLM_API_KEY"
  store: false
  streaming: false

responses_tools:
  enable_web_search: true
  enable_file_search: false
  enable_skills: true
  enable_tool_search: true
  web_search:
    allowed_domains:
      - arxiv.org
      - github.com
      - raw.githubusercontent.com
      - openreview.net
      - neuraloperator.github.io
    return_token_budget: 4096
  skills:
    local_skill_dirs:
      - skills
    enabled:
      - pdebench
      - neural_operator_research
      - hdf5_validation
      - rollout_training

budget:
  max_wall_clock_hours: 11.5
  reserve_finalize_seconds: 1800
  max_llm_calls: 120
  max_tool_calls: 500
  max_agent_steps: 100
  task1_preferred_train_minutes: 60
  task1_secondary_train_minutes: 120
  max_single_shell_seconds: 7200
