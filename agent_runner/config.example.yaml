workspace: workspace

router:
  model: gpt-5.4
  reasoning_effort: medium
  verbosity: medium
  wire_api: json_action
  temperature: 0.0
  max_tokens: 2048

llm_profiles:
  strong_planner:
    model: gpt-5.5
    reasoning_effort: xhigh
    verbosity: medium
    wire_api: json_action
    temperature: 0.2
    max_tokens: 8192

  coder:
    model: gpt-5.4
    reasoning_effort: high
    verbosity: medium
    wire_api: json_action
    temperature: 0.2
    max_tokens: 8192

  log_summarizer:
    model: gpt-5.2
    reasoning_effort: medium
    verbosity: low
    wire_api: json_action
    temperature: 0.0
    max_tokens: 4096

  json_judge:
    model: gpt-5.2
    reasoning_effort: medium
    verbosity: low
    wire_api: json_action
    temperature: 0.0
    max_tokens: 2048

openai:
  provider: third_party_openai_compatible
  base_url: "https://aixj.vip"
  api_key_env: "LLM_API_KEY"
  append_v1: true
  store: false
  streaming: false

fallback_provider:
  enabled: true
  provider: deepseek_openai_compatible
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  append_v1: false
  pro_model_env: "DEEPSEEK_PRO_MODEL"
  flash_model_env: "DEEPSEEK_FLASH_MODEL"

responses:
  # JsonActionClient only asks the provider for strict JSON actions.
  # All filesystem, shell, and network side effects stay in local tools.
  max_tool_calls_per_turn: 1
  retry_on_multi_tool_failure: true

submission_tasks:
  task1:
    pred_filename: task1_pred.hdf5
    time_filename: task1_time.csv
    logs_filename: task1_logs.log
    test_hdf5: data/task1_test.hdf5
    input_steps: 10
    total_steps: 200
    spatial_points: 256
  task2:
    pred_filename: task2_pred.hdf5
    time_filename: task2_time.csv
    logs_filename: task2_logs.log
    test_hdf5: data/task2_test.hdf5
    input_steps: 10
    total_steps: 200
    spatial_points: 256
  task3:
    pred_filename: task3_pred.hdf5
    time_filename: task3_time.csv
    logs_filename: task3_logs.log
    test_hdf5: data/task3_test.hdf5
    input_steps: 20
    total_steps: 400
    spatial_points: 256

responses_tools:
  enable_web_search: false
  experimental_enable_hosted_web_search: false
  enable_file_search: false
  enable_skills: true
  enable_tool_search: true
  web_search:
    allowed_domains:
      - arxiv.org
      - github.com
      - raw.githubusercontent.com
      - openreview.net
      - neuraloperator.github.io
    return_token_budget: 4096
  skills:
    local_skill_dirs:
      - skills
    enabled:
      - pdebench
      - neural_operator_research
      - hdf5_validation
      - rollout_training

research:
  enabled: true
  cache_dir: workspace/research/cache
  user_agent: "cozy_pde_research_agent/0.1"
  request_timeout_seconds: 20
  max_response_bytes: 5000000
  max_pdf_bytes: 30000000
  respect_robots_txt: true
  allow_raw_github: true
  providers:
    arxiv:
      enabled: true
      min_interval_seconds: 3
    github:
      enabled: true
      api_key_env: GITHUB_TOKEN
      allow_unauthenticated: true
  allowed_domains:
    - arxiv.org
    - export.arxiv.org
    - github.com
    - raw.githubusercontent.com
    - openreview.net
    - neuraloperator.github.io
  blocked_extensions:
    - .hdf5
    - .h5
    - .pt
    - .pth
    - .ckpt
    - .npz
    - .npy
    - .tar
    - .zip

budget:
  max_wall_clock_hours: 11.5
  reserve_finalize_seconds: 1800
  max_llm_calls: 120
  max_tool_calls: 500
  max_agent_steps: 100
  task1_preferred_train_minutes: 60
  task1_secondary_train_minutes: 120
  max_single_shell_seconds: 7200
